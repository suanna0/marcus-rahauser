<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />

    <title>Golf With [Your] Buddies | Marcus Rahauser</title>

    <link rel="stylesheet" href="https://use.typekit.net/scm7lei.css" />

    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <div class="content" role="main">
        <button class="hamburger" id="hamburger">&#9776;</button> 

        <div class="navigation" id="nav_menu">
          <h1 class="title"><a href="/">Marcus Rahauser</a></h1>
        </div>

        <div class="main-content">
          <h1 class="title" id = "mobile_title">
            <a href="../">Marcus Rahauser</a>
          </h1>
          <div class="carousel-wrapper">
            <div class="carousel-container">
              <div class="carousel" id="golf-carousel"></div>
              <script>
                const carousel = document.getElementById('golf-carousel');
                const base = 'https://d3ooqq7pgkip0k.cloudfront.net/images/golf/';
                for (let i = 1; i <= 4; i++) {
                  const pad = i < 10 ? '0' + i : i;
                  carousel.innerHTML += `<img src="${base}${pad}.jpg" alt="Photo ${i}" />`;
                }
              </script>
            </div>
            <div class="nav_contain">
              <div class="nav prev"><p>←</p></div>
              <div class="nav next"><p>→</p></div>
            </div>
          </div>
          <div id="golf-thumbnails"></div>
          <script>
            const thumbs = document.getElementById('golf-thumbnails');
            const gbase = 'https://d3ooqq7pgkip0k.cloudfront.net/images/golf/';
            for (let i = 1; i <= 14; i++) {
              const pad = i < 10 ? '0' + i : i;
              thumbs.innerHTML += `<img id="img_thumbnail" src="${gbase}G${pad}.jpg" />`;
            }
          </script>
        </div>
      </div>
    </div>
  </body>
</html>
