<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://d3ooqq7pgkip0k.cloudfront.net/images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />

    <title>Film Archive | Marcus Rahauser</title>

    <link rel="stylesheet" href="https://use.typekit.net/scm7lei.css" />

    <link rel="stylesheet" href="../style.css" />
    <script src="../script.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <div class="content" role="main">
        <button class="hamburger" id="hamburger">&#9776;</button>

        <div class="navigation" id="nav_menu">
          <h1 class="title"><a href="/">Marcus Rahauser</a></h1>
        </div>

        <div class="main-content">
          <h1 class="title" id = "mobile_title">
            <a href="../">Marcus Rahauser</a>
          </h1>

          <div class="thumbnail" id="film-grid"></div>
          <script>
            const grid = document.getElementById('film-grid');
            const base = 'https://d3ooqq7pgkip0k.cloudfront.net/images/film_photo/';
            const pad = n => n < 10 ? '0' + n : n;
            for (let i = 1; i <= 68; i += 2) {
              grid.innerHTML += `
                <div class="two-col-display">
                  <div class="two-col-container"><img src="${base}A${pad(i)}.jpg" /></div>
                  <div class="two-col-container"><img src="${base}A${pad(i + 1)}.jpg" /></div>
                </div>`;
            }
          </script>
        </div>
      </div>
    </div>
  </body>
</html>
